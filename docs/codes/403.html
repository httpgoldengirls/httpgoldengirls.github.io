<html lang="en">
  <head>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="https://glitch.com/favicon.ico" />
    <meta
      name="description"
      content="An app for learning about status codes!"
    />
    <meta
      name="og:description"
      content="An app for learning about status codes!"
    />
    <meta property="og:title" content="HTTP Golden Girls (403 Forbidden)" />
    <meta property="og:image" content="https://www.goldengirls.codes/Screenshot_20240813_235842_Firefox.jpg" />

    <title>HTTP Golden Girls (403 Forbidden)</title>

    <link rel="stylesheet" href="/style.css" />

  </head>
  <body>
    <div class="wrapper">
      <div class="content" role="main">
        <h1><a href="/">HTTP Golden Girls</a></h1>
        <p class="intro">
          A fun way to learn about status codes, inspired by
          <a href="https://http.cat">http.cat</a>!
        </p>
        <p class="random">
          🎲
          <a href="/random.html">Choose a random code</a>
        </p>
        <div class="codes">
            <div class="highlight selected" id="code403">

              <h2>403</h2>
              <h3>Forbidden</h3>
              <div class="imghold">
                <img src="/Screenshot_20240813_235842_Firefox.jpg" alt="Dorothy and Stan naked in the back of a car" />
              </div>

              <div class="extra">
                <p></p>
                  <a
                    href="https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/403"
                  >403 on MDN</a>
              </div>
            </div>
        </div>
        <p id="bonus">
          Bonus: try selecting an invalid code, like
          <a href="/1000.html">1000</a>
        </p>
      </div>
      <footer class="footer">
        <a
          class="btn--remix"
          target="_top"
          href="https://github.com/httpgoldengirls/httpgoldengirls.github.io/"
        >
          🚧
          Remix your own
        </a>
      </footer>
    </div>

  </body>
</html>
