  <body>
    <div class="wrapper">
      <div class="content" role="main">
        <h1><a href="/">HTTP Golden Girls</a></h1>
        <p class="intro">
          A fun way to learn about status codes, inspired by
          <a href="https://http.cat">http.cat</a>!
        </p>
        <p class="random">
          🎲
          <a href="/random.html">Choose a random code</a>
        </p>
        <div class="codes">
            <div class="highlight selected" id="code407">

              <h2>407</h2>
              <h3>Proxy Authentication Required</h3>
              <div class="imghold">
                <img src="Screenshot_20240806_001418_Firefox.jpg" alt="Sophia saying if Tony calls tell him I faked" />
              </div>

              <div class="extra">
                <p>A taboo NOT broken by Seinfeld but by the Golden Girls many years before</p>
                  <a
                    href="https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/407"
                  >407 on MDN</a>
              </div>
            </div>
        </div>
        <p id="bonus">
          Bonus: try selecting an invalid code, like
          <a href="/1000.html">1000</a>
        </p>
      </div>
      <footer class="footer">
        <a
          class="btn--remix"
          target="_top"
          href="https://github.com/httpgoldengirls/httpgoldengirls.github.io/"
        >
          🚧
          Remix your own
        </a>
      </footer>
    </div>

  </body>
