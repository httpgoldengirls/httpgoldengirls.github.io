<html lang="en">

<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="favicon.ico" />
  <meta name="description" content="An app for learning about status codes!" />
  <meta name="og:description" content="An app for learning about status codes!" />
  <meta property="og:title" content="HTTP Golden Girls (nope)" />
  <meta property="og:image" content="https://www.goldengirls.codes/Screenshot_20240814_000625_Firefox.jpg" />

  <title>HTTP Golden Girls (nope)</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>
  <div class="wrapper">
    <div class="content" role="main">
      <h1><a href="/">HTTP Golden Girls</a></h1>
      <p class="intro">
        A fun way to learn about status codes, inspired by
        <a href="https://http.cat">http.cat</a>!
      </p>
      <p class="random">
        🎲
        <a href="/random.html">Choose a random code</a>
      </p>
      <div class="codes">

      </div>

      <p id="bonus">
        Bonus: try selecting an invalid code, like
        <a href="/1000.html">1000</a>
      </p>
    </div>
    <footer class="footer">
        <a
          class="btn--remix"
          target="_top"
          href="https://github.com/httpgoldengirls/httpgoldengirlsgithub.io/"
        >
          🚧
          Remix your own
        </a>
      </footer>
  </div>

  <script>
  let bonus = [
    {
      pic: "Screenshot_20240811_223228_Firefox.jpg",
      alt: "The girls at the piano"
    },
    {
      pic: "Screenshot_20240814_000625_Firefox.jpg",
      alt: "Sophia looking mischievous"
    },
    {
      pic: "Screenshot_20240806_000043_Firefox.jpg",
      alt: "The girls dressed as hens"
    },
    {
      pic: "Screenshot_20240806_000918_Firefox.jpg",
      alt: "Sophia with Mickey Rooney"
    },
    {
      pic: "Screenshot_20240806_001129_Firefox.jpg",
      alt: "Sophia in bed with Cesar Romero"
    },
    {
      pic: "Screenshot_20240811_223336_Firefox.jpg",
      alt: "Dorothy with Dick van Dyke"
    },
    {
      pic: "Screenshot_20240825_182402_Firefox.jpg",
      alt: "Blanche with Debbie Reynolds"
    },
    {
      pic: "clooney-golden-girls-1.jpg",
      alt: "George Clooney with Sophia and a love interest of Dorothy's"
    },
    {
      pic: "Screenshot_20240924_001317_Firefox.jpg",
      alt: "Sophia with Julio Iglesias"
    },
    {
      pic: "Screenshot_20240924_001334_Firefox.jpg",
      alt: "Dorothy with Leslie Nielsen"
    },
    {
      pic: "Screenshot_20240924_001355_Firefox.jpg",
      alt: "Dorothy with Alex Trebek and Merv Griffin"
    },
    {
      pic: "Screenshot_20240924_001408_Firefox.jpg",
      alt: "Rose with Don Ameche"
    },
    {
      pic: "Screenshot_20240924_233821_Firefox.jpg",
      alt: "The girls wearing golf gear"
    }
  ];
    let bns = bonus[Math.floor(Math.random() * bonus.length)];
    let code = {
      joker: true,
      code: 0,
      name: "WELP",
      pic: bns.pic,
      info: "Whoops! This one isn't on the list.",
      alt: bns.alt,
      img: bns.pic,
      status: 0
    };
    let content = `
            <div class="highlight selected" id="code${code.code}">

              <h2>${code.code}</h2>
              <h3>${code.name}</h3>
              <div class="imghold">
                <img src="${code.pic}" alt="${code.alt}" />
              </div>

              <div class="extra">
                <p>${code.info}</p>
                  <a
                    href="https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/{{{code}}}"
                  >${code.code} on MDN</a>
                
              </div>
            </div>
            `;
    document.querySelector(".codes").innerHTML = content;

  </script>
</body>

</html>
